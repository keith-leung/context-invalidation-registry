# config.ci.yaml — CI / test config (committed, mode: mock).
# CI uses this file so no real keys are needed.

mode: mock

default_provider: minimax

providers:
  minimax:
    base_url: https://gpt-agent.cc/v1
    api_key: FILL_IN_CONFIG_YAML
    tiers:
      low:    { model: MiniMax-M2.7-highspeed }
      medium: { model: MiniMax-M2.7-highspeed }
      high:   { model: MiniMax-M2.7-highspeed }

judge:
  provider: minimax
  tier: medium

embedding:
  provider: mock
  dimensions: 1536

reranker:
  provider: mock

guardrails:
  enabled: true
  nemoguardrails: false
  llamaguard: false
  fallback_reason: "CI mock mode"
  # Blocklists are abstract placeholders. The mechanism (category → severity
  # → block/warn) is the shipped IP; the actual regulated-domain vocabulary
  # is loaded from operator-private config in production. Category names
  # follow the `block_*` / `warn_*` prefix convention so severity is
  # derivable without a separate map (see input_guard.py).
  blocklists:
    block_category_a:
      - "PLACEHOLDER_TERM_A1"
      - "PLACEHOLDER_TERM_A2"
      - "PLACEHOLDER_TERM_A3"
    warn_category_a:
      - "PLACEHOLDER_TERM_B1"
      - "PLACEHOLDER_TERM_B2"
      - "PLACEHOLDER_TERM_B3"
    warn_category_b:
      - "PLACEHOLDER_TERM_C1"
      - "PLACEHOLDER_TERM_C2"

data_dir: data
seed_events_file: critical_events.demo.json
